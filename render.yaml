services:
  - type: web
    name: investment-agent
    runtime: node
    region: ohio
    plan: free
    buildCommand: npm install -g pnpm@9 && pnpm install --no-frozen-lockfile && pnpm --filter @workspace/investment-agent run build && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: GEMINI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: investment-agent-db
          property: connectionString

databases:
  - name: investment-agent-db
    databaseName: investment_agent
    plan: free
    region: ohio
