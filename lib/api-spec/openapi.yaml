openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: AI Investment Research Agent API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: research
    description: Investment research operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /research:
    get:
      operationId: listResearch
      tags: [research]
      summary: List recent research jobs
      description: Returns recent investment research history
      responses:
        "200":
          description: List of research jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ResearchJob"

    post:
      operationId: startResearch
      tags: [research]
      summary: Start an investment research job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResearchInput"
      responses:
        "201":
          description: Research job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResearchJob"

  /research/{id}:
    get:
      operationId: getResearch
      tags: [research]
      summary: Get research job by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Research job details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResearchJob"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /research/stats:
    get:
      operationId: getResearchStats
      tags: [research]
      summary: Get aggregate stats on past research
      responses:
        "200":
          description: Aggregate research stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResearchStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ResearchInput:
      type: object
      required:
        - company
      properties:
        company:
          type: string
          minLength: 1
          description: Company name to research

    ResearchJob:
      type: object
      required:
        - id
        - company
        - status
        - createdAt
      properties:
        id:
          type: integer
        company:
          type: string
        status:
          type: string
          enum: [pending, running, completed, failed]
        verdict:
          type: ["string", "null"]
          enum: [invest, pass, unknown, null]
        summary:
          type: ["string", "null"]
        reasoning:
          description: Array of reasoning bullet points
          oneOf:
            - type: array
              items:
                type: string
            - type: "null"
        sources:
          description: Array of source URLs used in research
          oneOf:
            - type: array
              items:
                type: string
            - type: "null"
        confidence:
          type: ["integer", "null"]
          description: Confidence score 1-10
        details:
          description: Rich structured research data (company info, stock data, scores, etc.)
          oneOf:
            - type: object
            - type: "null"
        createdAt:
          type: string
        completedAt:
          type: ["string", "null"]

    ResearchStats:
      type: object
      required:
        - total
        - invest
        - pass
        - pending
        - avgConfidence
      properties:
        total:
          type: integer
        invest:
          type: integer
        pass:
          type: integer
        pending:
          type: integer
        avgConfidence:
          type: ["number", "null"]

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
